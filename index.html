<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QADworks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif}
:root{--o:#F27D2D;--y:#FFC40C;--t:#2D3030;--grad:linear-gradient(135deg,#F27D2D,#FFC40C)}
.landing{position:relative;width:100vw;height:100vh;background:radial-gradient(ellipse at center,#fcd34d 0%,#fbbf24 30%,#f59e0b 55%,#f07010 85%,#e85d00 100%)}
.landing::before{content:'';position:absolute;inset:0;background:url('https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image1.png') center/cover no-repeat;z-index:0}
.logo-wrap{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);z-index:10;cursor:pointer;transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .3s cubic-bezier(.22,1,.36,1);opacity:0}
.logo-wrap:hover{transform:translate(-50%,-50%) scale(1.06)}
.logo-wrap img{width:196px;display:block}
@keyframes logoZoomOut{0%{transform:translate(-50%,-50%) scale(1);opacity:1}60%{transform:translate(-50%,-50%) scale(1.25);opacity:1}100%{transform:translate(-50%,-50%) scale(1.15);opacity:0}}
.logo-wrap.zooming{animation:logoZoomOut .5s cubic-bezier(.22,1,.36,1) forwards!important;pointer-events:none}
@keyframes bob{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-6px)}}
.icon{position:absolute;cursor:pointer;z-index:5;width:24vw;height:24vw;max-width:304px;max-height:304px;min-width:160px;min-height:160px;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);opacity:0;transition:opacity .8s cubic-bezier(.22,1,.36,1)}
.icon img{width:100%;height:100%;object-fit:contain;display:block}
.icon .label{position:absolute;bottom:28%;left:50%;transform:translateX(-50%);color:var(--o);font-size:clamp(9px,1vw,13px);font-weight:800;text-align:center;line-height:1.3;opacity:1;pointer-events:none;white-space:nowrap;background:rgba(255,255,255,.75);padding:5px 14px;border-radius:24px;box-shadow:0 2px 10px rgba(0,0,0,.1);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.icon:hover{z-index:20}
.icon[data-section="network"]{left:50%;top:17%}
.icon[data-section="network"]:hover{transform:translate(-50%,-50%) scale(1.08)}
.icon[data-section="network"].bobbing{animation:bob 3.2s ease-in-out infinite}
.icon[data-section="data"]{left:26%;top:30%;width:30vw;height:30vw;max-width:380px;max-height:380px;min-width:200px;min-height:200px}
.icon[data-section="data"]:hover{transform:translate(-50%,-50%) scale(1.08)}
.icon[data-section="data"].bobbing{animation:bob 3.6s ease-in-out infinite}
.icon[data-section="software"]{left:74%;top:30%}
.icon[data-section="software"]:hover{transform:translate(-50%,-50%) scale(1.08)}
.icon[data-section="software"].bobbing{animation:bob 3.4s ease-in-out infinite .2s}
.icon[data-section="sap"]{left:26%;top:58%}
.icon[data-section="sap"]:hover{transform:translate(-50%,-50%) scale(1.08)}
.icon[data-section="sap"].bobbing{animation:bob 3.8s ease-in-out infinite .4s}
.icon[data-section="automation"]{left:74%;top:58%}
.icon[data-section="automation"]:hover{transform:translate(-50%,-50%) scale(1.08)}
.icon[data-section="automation"].bobbing{animation:bob 3.3s ease-in-out infinite .1s}
.icon[data-section="bpo"]{left:50%;top:74%;width:25vw;height:25vw;max-width:316px;max-height:316px;min-width:166px;min-height:166px}
.icon[data-section="bpo"]:hover{transform:translate(-50%,-50%) scale(1.08)}
.icon[data-section="bpo"].bobbing{animation:bob 3.5s ease-in-out infinite .3s}
@media(max-aspect-ratio:4/3){.icon{width:28vw;height:28vw}.icon[data-section="data"]{width:33vw;height:33vw}.logo-wrap img{width:150px}}
.presenter{position:fixed;inset:0;z-index:1000;background:rgba(255,255,255,.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.22,1,.36,1);transform:scale(1.008);touch-action:manipulation}
.presenter.open{opacity:1;pointer-events:auto;transform:scale(1)}
.pres-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0}
.pres-hdr-left{display:flex;align-items:center;gap:14px}
.pres-hdr-left img{height:24px;transition:opacity .2s;cursor:pointer}
.pres-hdr-left img:hover{opacity:.7}
.pres-hdr-sep{width:1px;height:18px;background:#ddd}
.pres-title{color:var(--o);font-size:17px;font-weight:700;letter-spacing:.3px}
.pres-close{background:var(--o);border-radius:12px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:#fff;border:none;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(242,125,45,.3)}
.pres-close:hover{background:#d65a10;transform:scale(1.05);box-shadow:0 4px 12px rgba(242,125,45,.4)}
.pres-tabs{display:flex;gap:0;border-bottom:2px solid #f0f0f0;padding:0;flex-shrink:0;background:#fff;justify-content:center}
.pres-tab{padding:16px 36px;font-size:15px;font-weight:700;color:#bbb;border:none;cursor:pointer;background:none;position:relative;transition:color .25s;letter-spacing:.3px}
.pres-tab::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;border-radius:2px;background:var(--o);transform:scaleX(0);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.pres-tab.active{color:var(--o)}
.pres-tab.active::after{transform:scaleX(1)}
.pres-tab:hover{color:var(--o)}
.pres-body{flex:1;position:relative;overflow:auto;touch-action:manipulation;-webkit-overflow-scrolling:touch}
.pres-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:#fff;border:2px solid var(--o);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;color:var(--o);box-shadow:0 4px 20px rgba(0,0,0,.08);cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1)}
.pres-nav:hover{background:var(--o);color:#fff;box-shadow:0 6px 24px rgba(242,125,45,.3);transform:translateY(-50%) scale(1.08)}
.pres-prev{left:16px}.pres-next{right:16px}
.pres-slide{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px 36px}
.pres-slide-inner{max-width:1100px;width:100%}
.pres-dots{display:flex;gap:8px;justify-content:center;padding:14px 0;border-top:1px solid rgba(0,0,0,.04);flex-shrink:0}
.pres-dot{width:10px;height:10px;border-radius:5px;background:#e0e0e0;transition:all .35s cubic-bezier(.22,1,.36,1);border:none;cursor:pointer;padding:0}
.pres-dot.active{width:32px;background:var(--o);box-shadow:0 2px 8px rgba(242,125,45,.3)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.sl-label{color:var(--o);font-weight:700;font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.sl-h2{color:var(--t);font-size:28px;font-weight:800;line-height:1.25;margin-bottom:14px}
.sl-p{color:#999;font-size:14px;line-height:1.7;margin-bottom:16px}
.sl-row{display:flex;gap:36px;align-items:center}
.sl-flex1{flex:1}
.sl-img{flex:.75;display:flex;align-items:center;justify-content:center}
.sl-img img{max-height:360px;width:100%;object-fit:contain}
.sl-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sl-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.sl-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fafafa;border-radius:10px;border:1px solid #f0f0f0;transition:all .25s}
.sl-item:hover{background:#fff;border-color:rgba(242,125,45,.15);box-shadow:0 2px 8px rgba(242,125,45,.06)}
.sl-dot{width:6px;height:6px;border-radius:50%;background:var(--o);flex-shrink:0}
.sl-item span{color:#555;font-size:14px}
.sl-cap-hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sl-cap-icon{width:50px;height:50px;border-radius:16px;background:rgba(242,125,45,.06);border:1px solid rgba(242,125,45,.15);display:flex;align-items:center;justify-content:center}
.sl-cap-icon svg{width:22px;height:22px;stroke:var(--o);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sl-cap-icon-grad{width:50px;height:50px;border-radius:16px;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(242,125,45,.25)}
.sl-cap-icon-grad svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sl-metric{background:linear-gradient(135deg,#FFF5E0,#FFF9EA);border:1px solid rgba(255,196,12,.2);border-radius:16px;padding:18px 12px;text-align:center}
.sl-metric-v{color:var(--o);font-size:28px;font-weight:900;margin:0;letter-spacing:-1px}
.sl-metric-l{color:#bbb;font-size:9px;font-weight:600;margin:4px 0 0;text-transform:uppercase;letter-spacing:1.5px}
.sl-card{background:#fafafa;border:1px solid #f0f0f0;border-radius:16px;padding:18px 20px;transition:transform .3s}
.sl-card:hover{transform:translateY(-2px)}
.sl-card-o{background:rgba(242,125,45,.06);border:1px solid rgba(242,125,45,.15);border-radius:16px;padding:18px 20px;transition:transform .3s}
.sl-card-o:hover{transform:translateY(-2px)}
.sl-card-y{background:rgba(255,196,12,.08);border:1px solid rgba(255,196,12,.2);border-radius:16px;padding:18px 20px;transition:transform .3s}
.sl-card-y:hover{transform:translateY(-2px)}
.sl-card-green{background:#F0FDF4;border:1px solid #e0f0e0;border-radius:16px;padding:18px 20px;transition:transform .3s}
.sl-card-green:hover{transform:translateY(-2px)}
.sl-story-label{color:var(--o);font-weight:700;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:7px}
.sl-story-p{color:#666;font-size:14px;line-height:1.7;margin:0}
.sl-center{text-align:center}
.sl-h1{color:var(--t);font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1.1;margin-bottom:6px}
.sl-sub{color:#bbb;font-size:12px;margin:0}
/* Project cards */
.proj-card{background:#fff;border:1.5px solid #f0f0f0;border-radius:16px;margin-bottom:10px;overflow:hidden;transition:all .3s}
.proj-card:hover{border-color:rgba(242,125,45,.2);box-shadow:0 4px 16px rgba(242,125,45,.06)}
.proj-hdr{padding:18px 22px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}
.proj-hdr h4{font-size:16px;font-weight:700;color:var(--t);margin:0;flex:1}
.proj-tag{font-size:10px;font-weight:700;color:var(--o);background:rgba(242,125,45,.08);border:1px solid rgba(242,125,45,.12);padding:4px 12px;border-radius:20px;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.proj-chevron{color:#ccc;font-size:18px;transition:transform .3s;flex-shrink:0}
.proj-card.open .proj-chevron{transform:rotate(180deg);color:var(--o)}
.proj-body{padding:0 22px 18px;display:none}
.proj-card.open .proj-body{display:block}
.proj-body p{color:#777;font-size:14px;line-height:1.7}
.proj-body .proj-stat{display:inline-block;color:var(--o);font-weight:800;font-size:13px}
/* Image placeholder strip */
.img-strip{display:flex;gap:12px;margin-bottom:20px}
.img-ph{flex:1;background:#fafafa;border:1.5px dashed #e0e0e0;border-radius:14px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 8px;text-align:center;aspect-ratio:4/3}
.img-ph-label{color:#ccc;font-size:10px;font-weight:600;letter-spacing:.3px}
.img-ph-name{color:var(--o);font-size:9px;font-weight:700;margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.sl-card-o h4,.sl-card-y h4{font-size:14px!important}
.sl-card-o p,.sl-card-y p{font-size:13px!important;line-height:1.6!important}
@media(max-width:900px){.pres-slide{padding:16px 20px}.sl-row{flex-direction:column;gap:20px}.sl-img{display:none}.img-strip{flex-wrap:wrap}.img-ph{min-width:45%}}
</style>
</head>
<body>
<div class="landing">
  <div class="logo-wrap" onclick="openPresenter('qadworks')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/QADworks.svg" alt="QADworks"></div>
  <div class="icon" data-section="data" onclick="openPresenter('data')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image42.png" alt="Data"><div class="label">Data</div></div>
  <div class="icon" data-section="network" onclick="openPresenter('network')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image40.png" alt="Network Infrastructure"><div class="label">Network Infrastructure,<br>Service Desk &amp; IT Support</div></div>
  <div class="icon" data-section="software" onclick="openPresenter('software')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image39.png" alt="Software Engineering"><div class="label">Software Engineering</div></div>
  <div class="icon" data-section="sap" onclick="openPresenter('sap')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image41.png" alt="ERP with SAP"><div class="label">ERP with SAP</div></div>
  <div class="icon" data-section="automation" onclick="openPresenter('automation')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image37.png" alt="Automation Engineering"><div class="label">Automation Engineering</div></div>
  <div class="icon" data-section="bpo" onclick="openPresenter('bpo')"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/image38.png" alt="Operational Services (BPO)"><div class="label">Operational Services (BPO)</div></div>
</div>
<div class="presenter" id="presenter">
  <div class="pres-hdr"><div class="pres-hdr-left"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Landing%20Page/QADworks.svg" alt="QADworks" onclick="closePresenter()"><div class="pres-hdr-sep"></div><span class="pres-title" id="presTitle"></span></div><div style="display:flex;align-items:center;gap:10px"><span style="color:#ccc;font-size:14px;font-weight:600" id="presCount"></span><button class="pres-close" onclick="closePresenter()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div></div>
  <div class="pres-tabs" id="presTabs"></div>
  <div class="pres-body" id="presBody">
    <button class="pres-nav pres-prev" id="presPrev" onclick="presNav(-1)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="pres-nav pres-next" id="presNext" onclick="presNav(1)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
    <div class="pres-slide"><div class="pres-slide-inner" id="presContent"></div></div>
  </div>
  <div class="pres-dots" id="presDots"></div>
</div>
<script>
var R="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/QAD%20Marketing%20Assets";
var IMG={data:R+"/Branding%20Assets/Data%20graphics_QAD%20Assets.svg",dataCenter:R+"/Branding%20Assets/Data%20center%20graphics_QAD%20Assets.svg",system:R+"/Branding%20Assets/System_QAD%20Assets.svg",cube:R+"/Branding%20Assets/Cube%20graphics_QAD%20Assets.svg",service:R+"/Branding%20Assets/QADworks%20service_QAD%20Assets.svg",cyber:R+"/Branding%20Assets/Cyber%20Security%20graphics_QAD%20Assets.svg",team:R+"/Branding%20Assets/Team%20working_QAD%20Assets.svg",fullSys:R+"/Branding%20Assets/Full%20System_QAD%20Assets.svg",iso:R+"/Branding%20Assets/QAD%20Logo%20Iso%20(w%20person).svg",cloud:R+"/Branding%20Assets/Cloud%20graphics_QAD%20Assets.svg",dataCapture:R+"/Branding%20Assets/Data%20Capture_QAD%20Assets.svg"};
var IC={database:'<path d="M21 5c0 1.1-3.6 2-8 2S5 6.1 5 5m16 0c0-1.1-3.6-2-8-2S5 3.9 5 5m16 0v14c0 1.1-3.6 2-8 2s-8-.9-8-2V5m16 7c0 1.1-3.6 2-8 2s-8-.9-8-2"/>',cpu:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/>',settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09"/>',code:'<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',monitor:'<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>',shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',headphones:'<path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/>',zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/>',trending:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>'};
function svgI(n,sz){return'<svg width="'+(sz||22)+'" height="'+(sz||22)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(IC[n]||'')+'</svg>';}
var PBASE="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/QADworks/Our%20Partners/";

function mkImgStrip(imgs){var base="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Signifcant%20Projects/";return'<div class="img-strip">'+imgs.map(function(i){return'<div style="flex:1;border-radius:14px;overflow:hidden"><img src="'+base+i+'.png" style="width:100%;display:block"></div>'}).join('')+'</div>';}
function mkProj(p){return'<div class="proj-card" onclick="this.classList.toggle(\'open\')"><div class="proj-hdr"><h4>'+p.t+'</h4>'+(p.tag?'<span class="proj-tag">'+p.tag+'</span>':'')+'<span class="proj-chevron">\u25BE</span></div><div class="proj-body"><p>'+p.d+'</p></div></div>';}

var SECTIONS = {
  data: {
    title:"Data",icon:"database",img:IMG.data,
    tabs:["What We Do","Our Capabilities","Significant Projects"],
    slides:{
      0:['<div class="sl-row"><div class="sl-flex1"><div class="sl-cap-hdr"><div class="sl-cap-icon">'+svgI("database")+'</div><div><p class="sl-label">What We Do</p><h2 class="sl-h2">Transform Data into Power</h2></div></div><p class="sl-p">Data is a compass that guides business strategy and operations towards increased efficiency, cost savings, and security. At QADworks, we do not just look at data. We make sense of it. Our expertise spans the full data lifecycle: from acquisition and cleansing, through integration and engineering, all the way to warehousing, visualization, and advanced analytics.</p><p style="color:var(--o);font-size:13px;font-weight:700;margin:16px 0 10px">We specialize in:</p><div class="sl-grid2"><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Data Cleansing and Governance</h4><p style="color:#888;font-size:11px;line-height:1.5">Resolving discrepancies, standardizing records, and establishing governance frameworks that keep your data accurate and trustworthy over time.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Data Integration</h4><p style="color:#888;font-size:11px;line-height:1.5">Seamlessly connecting disparate systems, whether SAP, Coupa, Dynamics 365, or custom platforms, into a unified data layer using APIs, middleware, and automated pipelines.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Master Data Management</h4><p style="color:#888;font-size:11px;line-height:1.5">Creating a single source of truth across your enterprise, eliminating silos and conflicting records that slow decision-making.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Data Engineering and Warehousing</h4><p style="color:#888;font-size:11px;line-height:1.5">Designing scalable data architectures, building enterprise data warehouses, and enabling high-performance reporting on both cloud and on-premise environments.</p></div><div class="sl-card-o" style="grid-column:1/3"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Business Intelligence and Analytics</h4><p style="color:#888;font-size:11px;line-height:1.5">Delivering descriptive, diagnostic, predictive, and prescriptive analytics using tools like Power BI, Tableau, and custom AI/ML models, so your teams can act on insight rather than intuition.</p></div></div></div><div class="sl-img"><div style="text-align:center"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Services/Data%20Hierarchy.png" style="max-height:480px;width:100%;object-fit:contain"><p style="color:var(--o);font-size:13px;font-weight:700;margin-top:8px;letter-spacing:.5px">Data Hierarchy of Needs</p></div></div></div>'],
      1:['<div class="sl-center"><div style="background:#fff;border-radius:28px;padding:16px;max-width:1100px;margin:0 auto;box-shadow:0 0 15px 10px #fff,0 0 30px 20px rgba(255,255,255,.6),0 0 50px 30px rgba(255,255,255,.3)"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Capabilities/Data.svg" style="width:100%;object-fit:contain"></div></div>'],
      2:['<div>'+mkImgStrip(["data_img_01","data_img_02","data_img_03"])+[{t:"Enterprise Data Warehouse and Business Intelligence",tag:"Chemical Terminal Operator",d:"Designed and built the enterprise data warehouse, consolidating data from SCADA systems, SAP, terminal management systems, and operational applications into a single, queryable source of truth. The warehouse powers real-time dashboards and KPI reporting for executive decision-making, delivering <span class=\"proj-stat\">80% faster report generation</span> and enabling data-driven decisions across marine, truck, and rail operations. This multi-year engagement continues to expand as new data sources and analytics use cases are layered on top of the core platform."},{t:"Marketing Data Processing and Insights",tag:"Automotive OEM, Asia-Pacific",d:"Formalized a continued partnership with a major automotive manufacturer's regional subsidiary through a dedicated service agreement focused on marketing data processing capabilities. Over a two-year collaboration, QADworks delivered actionable insights that fueled sales growth by transforming raw marketing data into strategic intelligence. The engagement spans data governance, reporting automation, and advanced analytics."},{t:"Master Data Management and Data Governance",tag:"Chemical Terminal Operator",d:"Provides ongoing Master Data Management support, resolving data discrepancies between SAP, Coupa, and EAM systems, managing transactional issues across procurement and finance, and supporting integration middleware. The engagement covers BI reporting support, cloud ops, data governance, and training to increase internal supportability."},{t:"Data Warehouse for Financial Operations",tag:"Boutique Financial Advisory",d:"Proposed and scoped a data warehouse solution for a boutique firm providing outsourced operations for single family offices in the wealth management space. Focused on consolidating financial data from varied, unstructured sources (PDFs, Excel, scanned documents) into a centralized repository with programmatic matching, scoring systems, anomaly dashboards, and a roadmap toward AI-powered forecasting."},{t:"SAP-to-Coupa Data Integration",tag:"Global Industrial Enterprise",d:"Led the integration of critical data between SAP and Coupa, transitioning procurement and accounting processes. Streamlined the Procure-to-Pay (P2P) cycle, improved management and accuracy of Work Orders, Internal Orders, and Master Data, and delivered a fully automated end-to-end workflow through API connections, significantly reducing manual intervention."}].map(mkProj).join('')+'</div>']
    }

  software: {
    title:"Software Engineering",icon:"code",img:IMG.service,
    tabs:["What We Do","Our Capabilities","Significant Projects"],
    slides:{
      0:['<div class="sl-row"><div class="sl-flex1"><div class="sl-cap-hdr"><div class="sl-cap-icon">'+svgI("code")+'</div><div><p class="sl-label">What We Do</p><h2 class="sl-h2">Turning Complexity into Simplicity</h2></div></div><p class="sl-p">Our customer-centric design ensures that our solutions align perfectly with your business needs, providing an intuitive and seamless user experience. Our end-to-end software solutions offer robust performance from the front end to the back end, bolstered by APIs that connect your operations with the wider digital ecosystem. We deliver not just software but a competitive edge: enhanced operational efficiency, scalability for growth, and unmatched user experience.</p><p style="color:var(--o);font-size:12px;font-weight:700;margin:16px 0 10px">We specialize in:</p><div class="sl-grid2"><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Customer-Centric Design and Delivery</h4><p style="color:#888;font-size:11px;line-height:1.5">Every engagement starts with understanding your business processes, your users, and the outcomes that matter. We build with the end user in mind, not just the spec sheet.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Digital Transformation</h4><p style="color:#888;font-size:11px;line-height:1.5">We help organizations replace manual, paper-based workflows with modern digital platforms that capture real-time data, standardize operations, and integrate across departments.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">API Development and Integration</h4><p style="color:#888;font-size:11px;line-height:1.5">Connecting your systems to the wider digital ecosystem with performant, secure APIs that enable interoperability and automation.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Product Development</h4><p style="color:#888;font-size:11px;line-height:1.5">Building scalable, productized software solutions that can be deployed across multiple clients and industries, combining startup agility with enterprise-grade reliability.</p></div><div class="sl-card-o" style="grid-column:1/3"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Web, Mobile, and Application Development</h4><p style="color:#888;font-size:11px;line-height:1.5">Native and hybrid development across platforms, ensuring seamless experiences wherever your users work.</p></div></div></div><div class="sl-img"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Services/Customer%20Centric%20SWE.png" style="max-height:580px;width:100%;object-fit:contain"></div></div>'],
      1:['<div class="sl-center"><div style="background:#fff;border-radius:28px;padding:16px;max-width:1100px;margin:0 auto;box-shadow:0 0 15px 10px #fff,0 0 30px 20px rgba(255,255,255,.6),0 0 50px 30px rgba(255,255,255,.3)"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Capabilities/Software%20Engineering.svg" style="width:100%;object-fit:contain"></div></div>'],
      2:['<div>'+mkImgStrip(["swe_img_01","swe_img_02","swe_img_03"])+[{t:"Digital Marine Operations",tag:"Chemical Terminal Operator",d:"Designed and deployed a customized terminal management application, digitizing marine vessel operations previously managed through paper and spreadsheets. The platform enables real-time data capture, timestamped event tracking, and auditable workflow documentation. It standardizes vessel workflows, provides real-time visibility with offline capabilities on field tablets, and integrates with scheduling and planning tools. Result: <span class=\"proj-stat\">15% improved cycle time</span> across modalities impacting an average of 50 daily transactions, with <span class=\"proj-stat\">100+ manual processes eliminated</span>."},{t:"Terminal Management App Platform Deployment",tag:"Mid-Market Bulk Liquid Terminal",d:"Building on proven success at a partner terminal, QADworks is deploying the Marine module of a custom terminal management app platform. The project focuses on standardizing vessel workflows, capturing auditable timestamped events, and providing real-time visibility with offline capabilities on field tablets. This engagement marks the productization of QADworks' terminal software solutions for the broader market."},{t:"Terminal Management App",tag:"Chemical Terminal Operator",d:"Developed the terminal management app, digitizing work packet documentation and enabling real-time tracking of maintenance planning, tank cleaning, and truck planning operations. The system integrates with multiple backend systems to maximize revenue capturing and streamline operational handoffs across departments."},{t:"IT Programming and Automation Platform",tag:"Mid-Size Engineering Firm",d:"Partnered with a mid-size engineering and drafting firm to transform its tools into a unified, scalable, and internally owned automation platform. The solution eliminates manual bottlenecks, increases throughput, and supports long-term growth by consolidating fragmented tools into a single, maintainable system."},{t:"Customer Portal, Safety Data Sheets, and Truck Planner",tag:"Chemical Terminal Operator",d:"Deployed multiple purpose-built applications including a customer portal for external stakeholder access, a digital safety data sheet management system, and a truck planning application. Together, these tools improved customer service turnaround by <span class=\"proj-stat\">40%</span> and contributed to a <span class=\"proj-stat\">20% increase in customer retention</span>."}].map(mkProj).join('')+'</div>']
    }
  },
  automation: {
    title:"Automation Engineering",icon:"cpu",img:IMG.system,
    tabs:["What We Do","Our Capabilities","Significant Projects"],
    slides:{
      0:['<div class="sl-row"><div class="sl-flex1"><div class="sl-cap-hdr"><div class="sl-cap-icon">'+svgI("cpu")+'</div><div><p class="sl-label">What We Do</p><h2 class="sl-h2">SCADA & Industrial Automation</h2></div></div><p class="sl-p">Our SCADA and automation engineering practice is designed for comprehensive supervisory control and data acquisition, enabling real-time monitoring and control of your facilities. With over five years of certified experience on the Ignition platform by Inductive Automation, our engineers blend IT practices with OT (Operational Technology) expertise, allowing us to work effectively on projects involving critical infrastructure and industrial control systems.</p><p style="color:var(--o);font-size:12px;font-weight:700;margin:16px 0 10px">We specialize in:</p><div class="sl-grid2"><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">End-to-End SCADA Management</h4><p style="color:#888;font-size:11px;line-height:1.5">From legacy migration to greenfield deployment, we manage the full lifecycle of your SCADA environment including design, implementation, support, and enhancement.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Industrial Internet of Things (IIoT)</h4><p style="color:#888;font-size:11px;line-height:1.5">Seamless integration of IoT devices into your infrastructure using MQTT, Sparkplug B, and the Unified Namespace (UNS) data model for enhanced efficiency and connectivity.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">HMI Programming</h4><p style="color:#888;font-size:11px;line-height:1.5">Creating intuitive Human-Machine Interfaces for seamless interaction with your systems, aligned with operational workflows and safety requirements.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">SCADA Conversion and Enhancement</h4><p style="color:#888;font-size:11px;line-height:1.5">Migrating from legacy platforms (Intellution, Wonderware, iFix) to modern solutions like Ignition, with full hybrid infrastructure integration.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Asset Tracking and Monitoring</h4><p style="color:#888;font-size:11px;line-height:1.5">Accurate monitoring and management of your valuable resources through integrated tracking systems.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">On-Call Troubleshooting and Support</h4><p style="color:#888;font-size:11px;line-height:1.5">Responsive support services for critical infrastructure, ensuring uptime and reliability around the clock.</p></div></div></div><div class="sl-img"><div style="text-align:center"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Services/SCADA.svg" style="max-height:580px;width:100%;object-fit:contain"><p style="color:var(--o);font-size:13px;font-weight:700;margin-top:8px;letter-spacing:.5px">From Sensors to Strategy</p></div></div></div>'],
      1:['<div class="sl-center"><div style="background:#fff;border-radius:28px;padding:16px;max-width:1100px;margin:0 auto;box-shadow:0 0 15px 10px #fff,0 0 30px 20px rgba(255,255,255,.6),0 0 50px 30px rgba(255,255,255,.3)"><img src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/Capabilities/Automation%20Engineering.svg" style="width:100%;object-fit:contain"></div></div>'],
      2:['<div>'+mkImgStrip(["auto_img_01","auto_img_02","auto_img_03"])+[{t:"Multi-Year SCADA Migration to Ignition",tag:"Chemical Terminal Operator",d:"Executed a comprehensive, multi-year SCADA migration program, transitioning from legacy Intellution and Wonderware platforms to Inductive Automation's Ignition SCADA. The deployment spans <span class=\"proj-stat\">286,259+ Ignition tags</span>, <span class=\"proj-stat\">432 Perspective views</span>, and <span class=\"proj-stat\">10 Perspective workstations</span> across a 76-acre facility. The project includes the Terminal Automation System (TAS), historian migration, data warehouse integration, and cloud SCADA containerization. This initiative earned the client's IT leadership a regional CIO award nomination."},{t:"Tank Bay Expansion SCADA Integration",tag:"Chemical Terminal Operator",d:"Led the SCADA integration for a major terminal expansion that added nine new tanks with a combined capacity of <span class=\"proj-stat\">32,400 cubic meters (approximately 204,000 barrels)</span>. Each tank was engineered with positive pressure systems and full automation. QADworks deployed Ignition SCADA to the new bay, integrating Allen-Bradley ControlLogix PLCs with standardized UDT structures, ensuring seamless interoperability with the broader terminal automation system."},{t:"SCADA Platform Migration (East Coast Facility)",tag:"Chemical Terminal Operator",d:"Scoping and executing the migration of a secondary terminal facility from an obsolete legacy SCADA platform to Ignition SCADA. The legacy system suffered from poor vendor support and limited scalability. QADworks is applying the proven migration methodology developed at the operator's primary terminal to modernize the facility's control environment."},{t:"AgriTech IIoT and SCADA Deployment",tag:"Indoor Vertical Farming",d:"Deployed Ignition SCADA for an indoor vertical farming enterprise, implementing IIoT-enabled monitoring across the facility. The project included <span class=\"proj-stat\">320 tags</span>, <span class=\"proj-stat\">13 screens</span>, and integration with agricultural control systems, demonstrating QADworks' ability to apply industrial automation expertise beyond the traditional energy and chemicals sectors."},{t:"Unified Namespace (UNS) Implementation",tag:"Enterprise Standard",d:"Implemented the Unified Namespace data model in Ignition using User Defined Types (UDTs) to create reusable, standardized asset models within the tag hierarchy. These UDTs define consistent structures for common equipment types (motors, VFDs, sensors, actuators, tanks) and align with Ignition GUI Templates and PLC structured tags. The underlying MQTT broker leveraging Sparkplug B serves as the transport layer, ensuring a single source of truth across enterprise systems."}].map(mkProj).join('')+'</div>']
    }

      0:['<div class="sl-row"><div class="sl-flex1"><div class="sl-cap-hdr"><div class="sl-cap-icon">'+svgI("settings")+'</div><div><p class="sl-label">What We Do</p><h2 class="sl-h2">Future-proofing your Enterprise, one module at a time</h2></div></div><p class="sl-p">We offer a synergy of extensive SAP module expertise, precision ABAP development, seamless system integrations, and post-implementation support. Our SAP practice goes beyond configuration and customization. We treat your ERP system as the backbone of your enterprise data strategy, connecting transactional processes to analytics, governance, and continuous improvement.</p><p style="color:var(--o);font-size:12px;font-weight:700;margin:16px 0 10px">We specialize in:</p><div class="sl-grid2"><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">SAP Native Module Expertise</h4><p style="color:#888;font-size:11px;line-height:1.5">Deep knowledge across core SAP modules, ensuring your system is configured to support your specific industry workflows and compliance requirements.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">SAP ABAP Development</h4><p style="color:#888;font-size:11px;line-height:1.5">Precision custom development to extend SAP capabilities, build reports, and create interfaces that standard configuration cannot address.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">SAP Implementation and Solutions</h4><p style="color:#888;font-size:11px;line-height:1.5">End-to-end implementation from blueprinting through go-live, with a focus on minimizing disruption and maximizing user adoption.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">SAP Integration</h4><p style="color:#888;font-size:11px;line-height:1.5">Connecting SAP with other enterprise systems (Coupa, EAM, Dynamics 365, custom platforms) through middleware, APIs, and direct interfaces to ensure seamless data flow.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Post-Implementation Support</h4><p style="color:#888;font-size:11px;line-height:1.5">Ongoing functional and technical support to resolve issues, optimize processes, and adapt the system as your business evolves.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Business Process Support</h4><p style="color:#888;font-size:11px;line-height:1.5">Ensuring your SAP-enabled processes are not just functional but optimized, with continuous feedback loops between operations and system configuration.</p></div></div></div><div class="sl-img"><img src="'+IMG.cube+'" style="max-height:580px;width:100%;object-fit:contain"></div></div>'],

      2:['<div>'+mkImgStrip(["sap_img_01","sap_img_02","sap_img_03"])+[{t:"SAP Integration and Business Process Support",tag:"Chemical Terminal Operator",d:"Provides comprehensive SAP support across a multinational chemical terminal operator's US facilities, covering integration with Coupa (procurement), EAM (asset management), and the broader data warehouse ecosystem. The engagement spans transactional issue resolution in procurement and finance, integration breakage remediation, and business process optimization. QADworks serves as the bridge between SAP, middleware, and business stakeholders."},{t:"Data Integration from SAP to Coupa",tag:"Global Industrial Enterprise",d:"Led the integration of critical data between SAP and Coupa for a global industrial enterprise transitioning procurement and accounting processes. Streamlined the Procure-to-Pay cycle, improved management of Work Orders, Internal Orders, and Master Data, and delivered a fully automated, API-driven workflow. Manual intervention was reduced significantly, and end-to-end process integrity was established across both platforms."},{t:"Data Migration and Analytics (Microsoft/SAP through Power BI)",tag:"Government Financial Institution",d:"Engaged for an analytics, data visualization, and dashboarding project using Power BI, with existing data sourced from Microsoft and SAP environments. The scope includes migration, consolidation, and the creation of actionable dashboards that connect ERP transactional data with strategic decision-making."},{t:"SAP Service Configuration for Vessel and Barge Handling",tag:"Chemical Terminal Operator",d:"Executed SAP service configuration for vessel and barge handling operations, integrating SAP with terminal management systems to ensure accurate invoicing, scheduling alignment, and operational compliance. The project delivered multi-system integration and process standardization."}].map(mkProj).join('')+'</div>']

      0:['<div class="sl-row"><div class="sl-flex1"><div class="sl-cap-hdr"><div class="sl-cap-icon">'+svgI("monitor")+'</div><div><p class="sl-label">What We Do</p><h2 class="sl-h2">Your IT Backbone, Strong & Future-Proof</h2></div></div><p class="sl-p">At our core, we specialize in comprehensive Infrastructure Management and Optimization. Our approach combines the project mentality of consulting with the managed support an MSP has to offer. We understand the unique dynamics of users, devices, applications, network, and infrastructure, and we design solutions that best fit your environment while empowering our teams to manage it with excellence.</p><p style="color:var(--o);font-size:12px;font-weight:700;margin:16px 0 10px">We specialize in:</p><div class="sl-grid2"><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Service Desk Support</h4><p style="color:#888;font-size:11px;line-height:1.5">Single-point-of-contact IT support during core business hours, handling everything from password resets and onboarding to incident diagnosis, escalation, and resolution.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Network Infrastructure Management</h4><p style="color:#888;font-size:11px;line-height:1.5">Troubleshooting connectivity issues, firewall management, performance monitoring, ISP vendor coordination, and management of WAPs, switches, and security devices.</p></div><div class="sl-card-o"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Cybersecurity and Compliance</h4><p style="color:#888;font-size:11px;line-height:1.5">Security assessments and audits, vulnerability management, threat detection and response, data protection and encryption, identity and access management, and compliance checks.</p></div><div class="sl-card-y"><h4 style="color:var(--o);font-size:12px;font-weight:700;margin-bottom:3px">Cloud Services and Solutions</h4><p       2:['<div>'+mkImgStrip(["net_img_01","net_img_02","net_img_03"])+[{t:"Infrastructure Modernization and Resilience Program",tag:"Chemical Terminal Operator",d:"Executed a multi-phase infrastructure modernization program addressing aging server and storage infrastructure across data centers. The program included: (1) Virtualization Environment Modernization, refreshing aging systems and migrating to a lower-cost virtualization platform. (2) Monitoring System Enhancement (Nectus), upgrading real-time visibility into critical infrastructure services across multiple terminal sites and network segments. (3) Backup Infrastructure Enhancement, expanding Rubrik backup solutions for enterprise-grade data protection and disaster recovery."},{t:"DMZ Security and Firewall Implementation",tag:"Chemical Terminal Operator",d:"Designed and implemented a Layer 3.5 DMZ buffer between OT and IT networks at a high-stakes chemical terminal, establishing proper network segmentation. The project included DMZ design workshops, FortiGate firewall deployment with As-Built documentation, implementation checklists, SOPs, and comprehensive network diagrams. The result: enhanced security posture, comprehensive documentation, and operational excellence in ongoing security maintenance."},{t:"Managed IT Support and Service Desk",tag:"Mid-Size Engineering Firm",d:"Partnered with a mid-size engineering firm to provide comprehensive managed IT support across all portfolio companies, regardless of size or location. The engagement covers L1 and L2 service desk support, network operations, server administration, user onboarding/offboarding, VPN configuration, and incident management. QADworks serves as the single point of contact, combining proactive infrastructure management with reactive support."},{t:"Network Upgrade and Cybersecurity Projects",tag:"Chemical Terminal Operator",d:"Manages an ongoing portfolio of network and cybersecurity projects including network upgrades, terminal wireless deployment, DMZ security improvements, physical security compliance (cameras, badge systems, reporting), and cyber integrity software implementation. Each project is scoped, tracked, and delivered under QADworks' program management framework."}].map(mkProj).join('')+'</div>']

      1:['<div class="sl-center"><p class="sl-label">Our Partners</p><h2 class="sl-h2" style="margin-bottom:28px">Trusted By Industry Leaders</h2><div style="position:relative;max-width:860px;margin:0 auto"><div style="background:#fff;border-radius:28px;padding:32px 28px;box-shadow:0 0 15px 10px #fff,0 0 30px 20px rgba(255,255,255,.6),0 0 50px 30px rgba(255,255,255,.3)"><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px">'+[["Quantem.svg","Quantem"],["Cooper%20Machinery%20Services.webp","Cooper"],["Odfjell.png","Odfjell"],["RaceRock.jpeg","Race Rock"],["Nissan.png","Nissan"],["Gulf%20States%20Toyota.png","Gulf States Toyota"],["SpawGlass.png","SpawGlass"],["GHPB.jpeg","GHPB"],["STHG.png","STHG"],["Basis.png","Basis"],["Lindsey.png","Lindsey"],["Radial%20Flow.svg","Radial Flow"],["Texas.png","Texas"],["Dyopath.png","Dyopath"],["Entrust.png","Entrust"],["Soliton.png","Soliton"],["Hardly.png","Hardly"],["New%20Process.jpeg","New Process"],["Aerofarms.png","Aerofarms"],["D360.svg","D360"]].map(function(p){return'<div style="display:flex;align-items:center;justify-content:center;min-height:80px;padding:10px"><img src="'+PBASE+p[0]+'" alt="'+p[1]+'" style="max-height:58px;max-width:100%;object-fit:contain"></div>'}).join('')+'</div></div></div></div>'],
      2:[
        '<div><div class="sl-cap-hdr"><div class="sl-cap-icon-grad">'+svgI("zap")+'</div><div><p class="sl-label">Success Story</p><h2 class="sl-h2">Digital Transformation \u2014 From Manual Gridlock to Real-Time Operations</h2><p class="sl-sub">Global Storage Terminal Operator</p></div></div><div style="display:flex;gap:12px;margin-bottom:18px">'+[{v:"$21M",l:"Program Value"},{v:"5 Yrs",l:"On Time"},{v:"100%",l:"On Budget"}].map(function(m){return'<div class="sl-metric" style="flex:1"><p class="sl-metric-v">'+m.v+'</p><p class="sl-metric-l">'+m.l+'</p></div>'}).join('')+'</div><div class="sl-grid2"><div class="sl-card"><p class="sl-story-label">The Customer</p><p class="sl-story-p">A global entity in the storage terminal industry specializing in chemicals and petroleum. Extensive infrastructure including deep-water berths, rail access, and numerous storage tanks, handling diverse products at scale.</p></div><div class="sl-card-o"><p class="sl-story-label">The Challenge</p><p class="sl-story-p">Massive paperwork across Marine, Truck, and Rail operations, all manual. Planning and scheduling spread across multiple tools, prone to human error and constant delays. A system held together by effort, not efficiency.</p></div><div class="sl-card-y"><p class="sl-story-label">The Solution</p><p class="sl-story-p">Built an application to digitize operations across all modalities, capturing timestamps and enabling real-time document transfer. Designed and deployed system integrations between a 3rd-party Planning &amp; Scheduling tool and the client\'s ERP, eliminating manual posting entirely.</p></div><div class="sl-card-green"><p class="sl-story-label">The Results</p><p class="sl-story-p">Full digitization of Marine, Truck, and Rail with real-time operational updates across all modalities. Seamless integration eliminated errors, saved time, and dramatically increased efficiency. The company shifted from gut-feel to data-based decisions on critical paths and everyday operations.</p></div></div><div style="margin-top:18px;position:relative;border-radius:16px;overflow:hidden;background:#f5f5f5;min-height:180px" id="dtSlideshow"><img id="dtImg" src="https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/QADworks/Success%20Stories/01.png" style="width:100%;display:block;border-radius:16px"><button onclick="dtManualNav(-1)" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.35);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px">\u2039</button><button onclick="dtManualNav(1)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.35);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px">\u203A</button><div style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px" id="dtDots"></div></div></div>',
        '<div><div class="sl-cap-hdr"><div class="sl-cap-icon-grad">'+svgI("cpu")+'</div><div><p class="sl-label">Success Story</p><h2 class="sl-h2">AI-Powered Knowledge Enablement \u2014 From Paper Black Hole to Instant Context</h2><p class="sl-sub">Industrial Parts and Service</p></div></div><div style="display:flex;gap:12px;margin-bottom:18px">'+[{v:"AI Agent",l:"Engineering and Sales Chatbot"},{v:"Minutes",l:"vs. Hours of Search"},{v:"100%",l:"Digitized Records"}].map(function(m){return'<div class="sl-metric" style="flex:1"><p class="sl-metric-v">'+m.v+'</p><p class="sl-metric-l">'+m.l+'</p></div>'}).join('')+'</div><div class="sl-grid2"><div class="sl-card"><p class="sl-story-label">The Customer</p><p class="sl-story-p">An industrial parts and service company with a room filled floor-to-ceiling with boxes of paper schematics, documents, and purchase orders. No order, no indexing. A veritable information black hole where the sales team went in almost blind.</p></div><div class="sl-card-o"><p class="sl-story-label">The Challenge</p><p class="sl-story-p">Sales staff spent hours searching for documents they might never find. Original schematics sat in one box while change records lived in another corner. There was no way to trace how parts evolved over time. Digitizing the entire archive was the first monumental step.</p></div><div class="sl-card-y"><p class="sl-story-label">The Solution</p><p class="sl-story-p">Consumed digitized data via OCR, built an AI algorithm to parse and build context, then deployed a sales-facing chatbot with the entire trove of information at their fingertips. Natural language queries like "Show me how these parts changed over time."</p></div><div class="sl-card-green"><p class="sl-story-label">The Results</p><p class="sl-story-p">Sales employees went from fruitless paper searches to full-bore sales efforts in minutes. The AI chatbot provides instant context: past orders, part evolution, customer history, all at their disposal. Individual empowerment bolstering the entire organization.</p></div></div></div>',
        '<div><div class="sl-cap-hdr"><div class="sl-cap-icon-grad">'+svgI("trending")+'</div><div><p class="sl-label">Success Story</p><h2 class="sl-h2">AI Leads Scoring \u2014 From Guesswork to 173% Sales Growth</h2><p class="sl-sub">Multinational Automotive Manufacturer</p></div></div><div style="display:flex;gap:12px;margin-bottom:18px">'+[{v:"173%",l:"Sales Growth"},{v:"4\u21927%",l:"Leads\u2192Orders"},{v:"2\u21925%",l:"Conversion"}].map(function(m){return'<div class="sl-metric" style="flex:1"><p class="sl-metric-v">'+m.v+'</p><p class="sl-metric-l">'+m.l+'</p></div>'}).join('')+'</div><div class="sl-grid2"><div class="sl-card"><p class="sl-story-label">The Customer</p><p class="sl-story-p">A multinational automotive manufacturer and distributor renowned for a diverse range of vehicles, from compact cars to SUVs and electric vehicles. Known for innovation in design and technology with a strong international footprint.</p></div><div class="sl-card-o"><p class="sl-story-label">The Challenge</p><p class="sl-story-p">Thousands of monthly inquiries with no way to separate serious buyers from casual browsers. Resource allocation was blind. The sales team spread thin across leads that may never convert, while high-intent customers slipped through the cracks.</p></div><div class="sl-card-y"><p class="sl-story-label">The Solution</p><p class="sl-story-p">Designed and developed a tailored AI leads scoring system deployed across all dealerships. The model analyzed sales and marketing data to surface leads with the highest likelihood of conversion, giving the team a clear priority map.</p></div><div class="sl-card-green"><p class="sl-story-label">The Results</p><p class="sl-story-p">173% growth in sales within 4 months versus the same period the prior year. Lead-to-sale-order rates rose from 4% to 7%, and conversion jumped from 2% to 5%. The system also provided visibility into monthly fallouts like out-of-stock and shipment issues, turning blind spots into actionable data.</p></div></div></div>',
        '<div><div class="sl-cap-hdr"><div class="sl-cap-icon-grad">'+svgI("database")+'</div><div><p class="sl-label">Success Story</p><h2 class="sl-h2">Automated Data Intelligence \u2014 From Manual Reporting to Real-Time Dashboards</h2><p class="sl-sub">Commercial Indoor Agriculture</p></div></div><div style="display:flex;gap:12px;margin-bottom:18px">'+[{v:"100%",l:"Automated Pipeline"},{v:"Real-Time",l:"Dashboard Updates"},{v:"Hours",l:"Saved Weekly"}].map(function(m){return'<div class="sl-metric" style="flex:1"><p class="sl-metric-v">'+m.v+'</p><p class="sl-metric-l">'+m.l+'</p></div>'}).join('')+'</div><div class="sl-grid2"><div class="sl-card"><p class="sl-story-label">The Customer</p><p class="sl-story-p">An AgriTech company whose reporting required hours of manual effort. Data existed in various states of complexity, and extraction followed an equally varied number of processes and policies.</p></div><div class="sl-card-o"><p class="sl-story-label">The Challenge</p><p class="sl-story-p">Weekly slides across departments had to be manually generated. When report makers were out, there was no documentation for handovers. Tracking the Operations floor relied on a single person with all context in their head.</p></div><div class="sl-card-y"><p class="sl-story-label">The Solution</p><p class="sl-story-p">Developed a Microsoft Fabric infrastructure to automate the entire data extraction, transformation, and loading into Power BI. Created a centralized data warehouse as a single source of truth, cutting through scattered folders and applications.</p></div><div class="sl-card-green"><p class="sl-story-label">The Results</p><p class="sl-story-p">Operations floor tracking shifted from one person\'s memory to an automated dashboard with near real-time updates. A key stakeholder was transformed from report generator into a data analyst, reinvesting freed time into strategy and tactical decisions.</p></div></div></div>'
      ]
    }

  var icons=document.querySelectorAll('.landing .icon');var logo=document.querySelector('.logo-wrap');
  logo.style.transition='none';logo.style.opacity='0';
  icons.forEach(function(el){el.style.transition='none';el.style.opacity='0';});
  void logo.offsetHeight;
  icons.forEach(function(el){el.style.transition='';el.style.transform='';el.style.animation='';void el.offsetHeight;el.classList.add('bobbing');});
  setTimeout(function(){
    logo.style.transition='opacity .6s cubic-bezier(.22,1,.36,1)';logo.style.opacity='1';
    icons.forEach(function(el){el.style.transition='opacity .6s cubic-bezier(.22,1,.36,1)';el.style.opacity='1';});
  },50);
}
function renderTabs(){var h='';curSection.tabs.forEach(function(t,i){h+='<button class="pres-tab'+(i===curTab?' active':'')+'" onclick="switchTab('+i+')">'+t+'</button>';});document.getElementById('presTabs').innerHTML=h;}
function switchTab(i){curTab=i;curSlide=0;renderTabs();renderSlide();}
function getSlides(){return curSection.slides[curTab]||[];}
function renderSlide(){
  var slides=getSlides();var el=document.getElementById('presContent');
  el.innerHTML=slides[curSlide]||'';
  document.getElementById('presCount').textContent=(curSlide+1)+'/'+slides.length;
  document.getElementById('presPrev').style.display=curSlide>0?'flex':'none';
  document.getElementById('presNext').style.display=curSlide<slides.length-1?'flex':'none';
  var dots=document.getElementById('presDots');
  if(slides.length>1){dots.style.display='flex';dots.innerHTML=slides.map(function(_,i){return'<button class="pres-dot'+(i===curSlide?' active':'')+'" onclick="goSlide('+i+')"></button>'}).join('');}else dots.style.display='none';
  el.style.animation='none';void el.offsetHeight;el.style.animation='slideIn .4s cubic-bezier(.22,1,.36,1) both';
}
function presNav(d){var slides=getSlides();curSlide=Math.max(0,Math.min(slides.length-1,curSlide+d));renderSlide();}
function goSlide(i){curSlide=i;renderSlide();}
document.addEventListener('keydown',function(e){if(!document.getElementById('presenter').classList.contains('open'))return;if(e.key==='Escape')closePresenter();if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();presNav(1);}if(e.key==='ArrowLeft')presNav(-1);});
var touchStartX=null,touchStartY=null,touchFingers=0;
document.getElementById('presBody').addEventListener('touchstart',function(e){touchFingers=e.touches.length;if(e.touches.length===1){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;}else{touchStartX=null;touchStartY=null;}},{passive:true});
document.getElementById('presBody').addEventListener('touchend',function(e){if(touchStartX===null||touchFingers>1){touchStartX=null;touchStartY=null;touchFingers=0;return;}var dx=touchStartX-e.changedTouches[0].clientX;var dy=touchStartY-e.changedTouches[0].clientY;if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*2){if(dx>0){var slides=getSlides();if(curSlide<slides.length-1){presNav(1);}else if(curTab<curSection.tabs.length-1){switchTab(curTab+1);}}else{if(curSlide>0){presNav(-1);}else if(curTab>0){switchTab(curTab-1);}}}touchStartX=null;touchStartY=null;touchFingers=0;},{passive:true});

// DT Slideshow
var dtImgs=['01.png','02.png','03.png','04.png','05.png'].map(function(f){return'https://raw.githubusercontent.com/dabsq/qadworksportfolio/main/Graphic%20Assets/QADworks/Success%20Stories/'+f});
var dtIdx=0,dtTimer=null;
function dtBuildDots(container,active,count){var el=document.getElementById(container);if(!el)return;el.innerHTML='';for(var i=0;i<count;i++){var d=document.createElement('div');d.style.cssText='width:8px;height:8px;border-radius:50%;background:'+(i===active?'var(--o)':'rgba(255,255,255,.5)')+';transition:all .3s';el.appendChild(d);}}
function dtAdvance(){var img=document.getElementById('dtImg');if(!img)return;var wait=dtIdx===4?7000:3000;dtTimer=setTimeout(function(){dtIdx=(dtIdx+1)%5;img.src=dtImgs[dtIdx];dtBuildDots('dtDots',dtIdx,5);dtAdvance();},wait);}
function dtStartSlideshow(){dtIdx=0;var img=document.getElementById('dtImg');if(img){img.src=dtImgs[0];}dtBuildDots('dtDots',0,5);if(dtTimer)clearTimeout(dtTimer);dtAdvance();}
function dtStopSlideshow(){if(dtTimer){clearTimeout(dtTimer);dtTimer=null;}}
function dtManualNav(d){dtStopSlideshow();dtIdx=Math.max(0,Math.min(4,dtIdx+d));var img=document.getElementById('dtImg');if(img)img.src=dtImgs[dtIdx];dtBuildDots('dtDots',dtIdx,5);dtTimer=setTimeout(function(){dtAdvance();},60000);}
var origRender=renderSlide;
renderSlide=function(){origRender();dtStopSlideshow();setTimeout(function(){if(document.getElementById('dtSlideshow'))dtStartSlideshow();},100);}

// Init
var initOrder=['network','software','automation','bpo','sap','data'];
document.querySelectorAll('.icon').forEach(function(el){el.classList.add('bobbing');});
setTimeout(function(){document.querySelector('.logo-wrap').style.opacity='1';initOrder.forEach(function(sec,i){var el=document.querySelector('.icon[data-section="'+sec+'"]');if(!el)return;el.style.transitionDelay=(0.15*(i+1))+'s';el.style.opacity='1';});setTimeout(function(){document.querySelectorAll('.icon').forEach(function(el){el.style.transitionDelay='';});},1600);},100);
</script>
